<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Avaliação</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('assets/Fundo facisa.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        .calculadora-card {
            background-color: #2563eb;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        h2 {
            color: #ffffff;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Estrutura das Barras Laterais */
        .secao-peso {
            position: relative;
            padding-left: 16px;
            margin-bottom: 15px;
        }

        /* Barra Lateral AG (60%) */
        .secao-ag {
            border-left: 4px solid #c4d82d;
        }

        /* Barra Lateral AI (40%) */
        .secao-ai {
            border-left: 4px solid #60a5fa;
        }

        /* Rótulos das Seções em Branco de Alto Contraste */
        .peso-label {
            font-size: 12px;
            font-weight: 700;
            color: #ffffff; /* Texto padronizado em branco */
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Etiqueta discreta da porcentagem */
        .porcentagem-tag {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
        }

        .secao-ag .porcentagem-tag {
            background-color: rgba(196, 216, 45, 0.25);
            color: #c4d82d;
        }

        .secao-ai .porcentagem-tag {
            background-color: rgba(96, 165, 250, 0.25);
            color: #93c5fd;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .badge-ag {
            background-color: #c4d82d;
            color: #0b1d3a;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 900;
            margin-right: 6px;
        }

        .badge-ai {
            background-color: #60a5fa;
            color: #ffffff;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 900;
            margin-right: 6px;
        }

        /* Caixas de Texto com Fundo Branco de Alto Contraste */
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffffff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            font-weight: 600;
            color: #0b1d3a;
            background-color: #ffffff;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #c4d82d;
            box-shadow: 0 0 0 4px rgba(196, 216, 45, 0.4);
        }

        input[type="text"]::placeholder {
            color: #94a3b8;
            font-weight: normal;
        }

        .resumo-box {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #ffffff;
            margin-top: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .resumo-box strong {
            font-size: 16px;
            color: #c4d82d;
        }

        .mascote-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mascote-img {
            max-height: 120px;
            object-fit: contain;
        }

        #outResposta {
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            line-height: 1.4;
            display: none;
        }

        .alerta-sucesso { 
            background-color: #c4d82d; 
            color: #0b1d3a; 
            border: 1px solid #a8ba21; 
        }

        .alerta-erro { 
            background-color: #fecdd3; 
            color: #881337; 
            border: 1px solid #fda4af; 
        }

        .alerta-aviso { 
            background-color: #fef08a; 
            color: #713f12; 
            border: 1px solid #fde047; 
        }
    </style>
</head>
<body>

    <div class="calculadora-card">
        <h2>Simulador de Situação</h2>
        
        <div class="secao-peso secao-ag">
            <div class="peso-label">
                Avaliação Grupal <span class="porcentagem-tag">60%</span>
            </div>
            <div class="form-group">
                <label><span class="badge-ag">AG</span> Fase 1 (Máx 3.0):</label>
                <input type="text" id="inProj1" placeholder="0.0">
            </div>
            <div class="form-group">
                <label><span class="badge-ag">AG</span> Fase 2 (Máx 3.0):</label>
                <input type="text" id="inProj2" placeholder="0.0">
            </div>
        </div>
        
        <div class="secao-peso secao-ai">
            <div class="peso-label">
                Avaliação Individual <span class="porcentagem-tag">40%</span>
            </div>
            <div class="form-group">
                <label><span class="badge-ai">AI</span> Avaliação Indiv. (Máx 4.0):</label>
                <input type="text" id="inIndiv" placeholder="0.0">
            </div>
        </div>

        <div class="resumo-box">
            <span>AG Total: <strong id="outAg">0.00</strong></span>
            <span>Nota Atual: <strong id="outTotal">0.00</strong></span>
        </div>

        <div class="mascote-container">
            <img id="imgMascote" class="mascote-img" src="https://via.placeholder.com/120x120/2563eb/ffffff?text=Neutro" alt="Mascote Institucional">
        </div>

        <div id="outResposta"></div>
    </div>

    <script>
        var inP1 = document.getElementById("inProj1");
        var inP2 = document.getElementById("inProj2");
        var inAi = document.getElementById("inIndiv");
        
        var outAg = document.getElementById("outAg");
        var outTotal = document.getElementById("outTotal");
        var outResposta = document.getElementById("outResposta");
        var imgMascote = document.getElementById("imgMascote");

        var MASCOTES = {
            neutro: "https://via.placeholder.com/120x120/2563eb/ffffff?text=Neutro",
            feliz: "https://via.placeholder.com/120x120/c4d82d/0b1d3a?text=Feliz",
            preocupado: "https://via.placeholder.com/120x120/fef08a/713f12?text=Preocupado",
            chorando: "https://via.placeholder.com/120x120/fecdd3/881337?text=Chorando"
        };

        function calcular() {
            var valP1 = inP1.value.trim().replace(',', '.');
            var valP2 = inP2.value.trim().replace(',', '.');
            var valAi = inAi.value.trim().replace(',', '.');

            var p1 = valP1 !== "" && !isNaN(valP1) ? parseFloat(valP1) : null;
            var p2 = valP2 !== "" && !isNaN(valP2) ? parseFloat(valP2) : null;
            var ai = valAi !== "" && !isNaN(valAi) ? parseFloat(valAi) : null;

            if (p1 !== null) {
                if (p1 > 3.0) { p1 = 3.0; inP1.value = 3; }
                if (p1 < 0) { p1 = 0; inP1.value = 0; }
            }
            if (p2 !== null) {
                if (p2 > 3.0) { p2 = 3.0; inP2.value = 3; }
                if (p2 < 0) { p2 = 0; inP2.value = 0; }
            }
            if (ai !== null) {
                if (ai > 4.0) { ai = 4.0; inAi.value = 4; }
                if (ai < 0) { ai = 0; inAi.value = 0; }
            }

            var agParcial = (p1 || 0) + (p2 || 0);
            var totalParcial = agParcial + (ai || 0);

            outAg.textContent = agParcial.toFixed(2);
            outTotal.textContent = totalParcial.toFixed(2);

            if (p1 === null || p2 === null || ai === null) {
                outResposta.style.display = "none";
                outResposta.className = "";
                imgMascote.src = MASCOTES.neutro;
                return;
            }

            outResposta.style.display = "block";
            outResposta.className = "";

            var ag = p1 + p2;
            var notaFinal = ag + ai;

            if (notaFinal >= 7.0) {
                outResposta.innerHTML = "<strong>Aprovado Direto!</strong> Parabéns, sua Nota Final foi " + notaFinal.toFixed(2) + ".";
                outResposta.classList.add("alerta-sucesso");
                imgMascote.src = MASCOTES.feliz;
                
            } else if (ag < 4.0) {
                outResposta.innerHTML = "<strong>Reprovado!</strong> Sua Avaliação em Grupo (AG = " + ag.toFixed(2) + ") é menor que 4,0 e sua nota não atingiu 7,0. Sem direito à prova final.";
                outResposta.classList.add("alerta-erro");
                imgMascote.src = MASCOTES.chorando;
                
            } else {
                var notaNecessariaFinal = Math.max(6.0 - ag, 0.1);

                if (notaNecessariaFinal > 4.0) {
                    outResposta.innerHTML = "<strong>Reprovado.</strong> Você precisaria de " + notaNecessariaFinal.toFixed(2) + " na Avaliação Final, mas a prova vale no máximo 4,0.";
                    outResposta.classList.add("alerta-erro");
                    imgMascote.src = MASCOTES.chorando;
                } else {
                    outResposta.innerHTML = "<strong>Avaliação Final!</strong> Média atual: " + notaFinal.toFixed(2) + ". Você precisa de pelo menos <strong>" + notaNecessariaFinal.toFixed(2) + "</strong> na Final.";
                    outResposta.classList.add("alerta-aviso");
                    imgMascote.src = MASCOTES.preocupado;
                }
            }
        }

        inP1.oninput = calcular;
        inP2.oninput = calcular;
        inAi.oninput = calcular;
    </script>
</body>
</html>
