<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Avaliação</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('assets/Fundo facisa.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        .calculadora-card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            overflow: hidden; /* Garante que o topo azul siga o arredondamento */
        }

        /* Topo azul escuro inspirado na barra da plataforma */
        .card-header {
            background-color: #0b1d3a; /* Azul escuro oficial */
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #c4d82d; /* Detalhe em verde/amarelo institucional */
        }

        .card-header h2 {
            color: #ffffff;
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #0b1d3a;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .badge-ag {
            background-color: #f0f4f8;
            color: #0b1d3a;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            margin-right: 6px;
            border: 1px solid #d0daf0;
        }

        .badge-ai {
            background-color: #0b1d3a;
            color: #ffffff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            margin-right: 6px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            color: #333333;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #0b1d3a;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(11, 29, 58, 0.1);
        }

        /* Painel de Notas no padrão limpo da plataforma */
        .resumo-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #0b1d3a;
            margin-top: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .resumo-box strong {
            font-size: 16px;
            color: #0b1d3a;
        }

        .mascote-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mascote-img {
            max-height: 120px;
            object-fit: contain;
        }

        /* Caixas de resposta integradas à paleta */
        #outResposta {
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            line-height: 1.4;
            display: none;
        }

        .alerta-erro { background-color: #ffebe9; color: #b71c1c; border-left: 4px solid #ff1744; }
        .alerta-sucesso { background-color: #edf7ed; color: #1b5e20; border-left: 4px solid #4caf50; }
        .alerta-aviso { background-color: #fffde7; color: #f57f17; border-left: 4px solid #fbc02d; }
    </style>
</head>
<body>

    <div class="calculadora-card">
        <div class="card-header">
            <h2>Simulador de Situação</h2>
        </div>
        
        <div class="card-body">
            <div class="form-group">
                <label><span class="badge-ag">AG</span> Fase 1 (Máx 3.0):</label>
                <input type="text" id="inProj1" placeholder="0.0">
            </div>
            
            <div class="form-group">
                <label><span class="badge-ag">AG</span> Fase 2 (Máx 3.0):</label>
                <input type="text" id="inProj2" placeholder="0.0">
            </div>
            
            <div class="form-group">
                <label><span class="badge-ai">AI</span> Avaliação Indiv. (Máx 4.0):</label>
                <input type="text" id="inIndiv" placeholder="0.0">
            </div>

            <div class="resumo-box">
                <span>AG Total: <strong id="outAg">0.00</strong></span>
                <span>Nota Atual: <strong id="outTotal">0.00</strong></span>
            </div>

            <div class="mascote-container">
                <img id="imgMascote" class="mascote-img" src="https://via.placeholder.com/120x120/f8fafc/0b1d3a?text=Neutro" alt="Mascote Institucional">
            </div>

            <div id="outResposta"></div>
        </div>
    </div>

    <script>
        var inP1 = document.getElementById("inProj1");
        var inP2 = document.getElementById("inProj2");
        var inAi = document.getElementById("inIndiv");
        
        var outAg = document.getElementById("outAg");
        var outTotal = document.getElementById("outTotal");
        var outResposta = document.getElementById("outResposta");
        var imgMascote = document.getElementById("imgMascote");

        var MASCOTES = {
            neutro: "https://via.placeholder.com/120x120/f8fafc/0b1d3a?text=Neutro",
            feliz: "https://via.placeholder.com/120x120/edf7ed/1b5e20?text=Feliz",
            preocupado: "https://via.placeholder.com/120x120/fffde7/f57f17?text=Preocupado",
            chorando: "https://via.placeholder.com/120x120/ffebe9/b71c1c?text=Chorando"
        };

        function calcular() {
            var valP1 = inP1.value.trim().replace(',', '.');
            var valP2 = inP2.value.trim().replace(',', '.');
            var valAi = inAi.value.trim().replace(',', '.');

            var p1 = valP1 !== "" && !isNaN(valP1) ? parseFloat(valP1) : null;
            var p2 = valP2 !== "" && !isNaN(valP2) ? parseFloat(valP2) : null;
            var ai = valAi !== "" && !isNaN(valAi) ? parseFloat(valAi) : null;

            if (p1 !== null) {
                if (p1 > 3.0) { p1 = 3.0; inP1.value = 3; }
                if (p1 < 0) { p1 = 0; inP1.value = 0; }
            }
            if (p2 !== null) {
                if (p2 > 3.0) { p2 = 3.0; inP2.value = 3; }
                if (p2 < 0) { p2 = 0; inP2.value = 0; }
            }
            if (ai !== null) {
                if (ai > 4.0) { ai = 4.0; inAi.value = 4; }
                if (ai < 0) { ai = 0; inAi.value = 0; }
            }

            var agParcial = (p1 || 0) + (p2 || 0);
            var totalParcial = agParcial + (ai || 0);

            outAg.textContent = agParcial.toFixed(2);
            outTotal.textContent = totalParcial.toFixed(2);

            if (p1 === null || p2 === null || ai === null) {
                outResposta.style.display = "none";
                outResposta.className = "";
                imgMascote.src = MASCOTES.neutro;
                return;
            }

            outResposta.style.display = "block";
            outResposta.className = "";

            var ag = p1 + p2;
            var notaFinal = ag + ai;

            if (notaFinal >= 7.0) {
                outResposta.innerHTML = "<strong>Aprovado Direto!</strong> Parabéns, sua Nota Final foi " + notaFinal.toFixed(2) + ".";
                outResposta.classList.add("alerta-sucesso");
                imgMascote.src = MASCOTES.feliz;
                
            } else if (ag < 4.0) {
                outResposta.innerHTML = "<strong>Reprovado!</strong> Sua Avaliação em Grupo (AG = " + ag.toFixed(2) + ") é menor que 4,0 e sua nota não atingiu 7,0. Sem direito à prova final.";
                outResposta.classList.add("alerta-erro");
                imgMascote.src = MASCOTES.chorando;
                
            } else {
                var notaNecessariaFinal = Math.max(6.0 - ag, 0.1);

                if (notaNecessariaFinal > 4.0) {
                    outResposta.innerHTML = "<strong>Reprovado.</strong> Você precisaria de " + notaNecessariaFinal.toFixed(2) + " na Avaliação Final, mas a prova vale no máximo 4,0.";
                    outResposta.classList.add("alerta-erro");
                    imgMascote.src = MASCOTES.chorando;
                } else {
                    outResposta.innerHTML = "<strong>Avaliação Final!</strong> Média atual: " + notaFinal.toFixed(2) + ". Você precisa de pelo menos <strong>" + notaNecessariaFinal.toFixed(2) + "</strong> na Final.";
                    outResposta.classList.add("alerta-aviso");
                    imgMascote.src = MASCOTES.preocupado;
                }
            }
        }

        inP1.oninput = calcular;
        inP2.oninput = calcular;
        inAi.oninput = calcular;
    </script>
</body>
</html>
